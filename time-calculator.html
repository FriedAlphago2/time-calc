<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Time Calc" />
<title>Time Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --bg2: #f2f0ec;
    --bg3: #e8e5df;
    --text: #1a1a18;
    --text2: #6b6a66;
    --text3: #a09e99;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
    --font: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2b;
      --text: #f0ede8;
      --text2: #9e9c96;
      --text3: #636159;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-text-size-adjust: 100%;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 16px) 18px env(safe-area-inset-bottom, 24px);
    padding-top: max(env(safe-area-inset-top), 20px);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  /* Start time */
  .start-block { margin-bottom: 24px; }

  .start-time-input {
    font-size: 30px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 0.5px solid var(--border2);
    width: 100%;
    padding: 4px 0 6px;
    outline: none;
    font-family: var(--font);
    -webkit-appearance: none;
  }
  .start-time-input:focus { border-bottom-color: var(--text2); }

  /* Timeline */
  .timeline { flex: 1; margin-bottom: 20px; }

  .timeline-empty {
    font-size: 14px;
    color: var(--text3);
    padding: 12px 0;
  }

  .step-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .step-row:first-child { border-top: 0.5px solid var(--border); }

  .step-time {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    min-width: 78px;
    flex-shrink: 0;
  }

  .step-label {
    font-size: 15px;
    color: var(--text2);
    flex: 1;
    min-width: 0;
  }

  .step-content {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: baseline;
    cursor: pointer;
  }

  .step-edit-row {
    display: flex;
    gap: 8px;
    flex: 1;
    min-width: 0;
    align-items: center;
  }

  .step-edit-dur {
    flex: 0 0 56px;
    width: 56px;
    min-width: 0;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--text2);
    border-radius: var(--radius);
    padding: 6px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
    text-align: center;
  }

  .step-edit-label {
    flex: 1;
    min-width: 0;
    width: 100%;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--text2);
    border-radius: var(--radius);
    padding: 6px 8px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
  }

  .step-delete {
    font-size: 20px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    -webkit-appearance: none;
    flex-shrink: 0;
  }
  .step-delete:active { opacity: 0.5; }

  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 2px;
  }
  .total-label { font-size: 13px; color: var(--text3); }
  .total-val { font-size: 13px; font-weight: 500; color: var(--text2); }

  .clear-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px 0;
    font-family: var(--font);
    display: block;
    text-align: right;
    width: 100%;
  }

  /* Entry block */
  .entry-block {
    background: var(--bg2);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 8px;
    max-width: 100%;
    box-sizing: border-box;
  }

  .entry-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    width: 100%;
  }

  .dur-input {
    flex: 0 0 56px;
    width: 56px;
    min-width: 0;
    font-size: 16px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 6px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
    text-align: center;
  }
  .dur-input:focus { border-color: var(--text2); }

  .memo-input {
    flex: 1 1 0;
    min-width: 0;
    width: 100%;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 10px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
  }
  .memo-input:focus { border-color: var(--text2); }
  .memo-input::placeholder, .dur-input::placeholder { color: var(--text3); }

  .add-btn {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    font-weight: 500;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    -webkit-appearance: none;
  }
  .add-btn:active { background: var(--bg3); }

  .hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
    text-align: center;
  }

  .error { border-color: #c0392b !important; }
</style>
</head>
<body>
<div class="app">

  <div class="start-block">
    <div class="section-label">Start time</div>
    <input class="start-time-input" id="startInput" type="text" placeholder="e.g. 9:00 AM" autocomplete="off" autocorrect="off" />
  </div>

  <div class="timeline" id="timeline">
    <div class="timeline-empty">Add steps below to build your timeline.</div>
  </div>

  <div class="entry-block">
    <div class="section-label" style="margin-bottom:10px">Add a step</div>
    <div class="entry-row">
      <input class="dur-input" id="durInput" type="text" placeholder="45" autocomplete="off" autocorrect="off" inputmode="text" />
      <input class="memo-input" id="memoInput" type="text" placeholder="label (optional)" autocomplete="off" autocorrect="off" />
    </div>
    <button class="add-btn" id="addBtn">Add step</button>
    <div class="hint">45 · 1h30 · 1:30 · 1.5h · 90</div>
  </div>

</div>

<script>
const steps = [];

function parseTime(str) {
  str = str.trim();
  const ampm = str.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
  if (ampm) {
    let h = parseInt(ampm[1]);
    const m = ampm[2] ? parseInt(ampm[2]) : 0;
    const p = ampm[3].toLowerCase();
    if (p === 'pm' && h !== 12) h += 12;
    if (p === 'am' && h === 12) h = 0;
    return h * 60 + m;
  }
  const colon = str.match(/^(\d{1,2}):(\d{2})$/);
  if (colon) return parseInt(colon[1]) * 60 + parseInt(colon[2]);
  return null;
}

function parseDuration(str) {
  str = str.trim().toLowerCase().replace(/\s+/g, '');
  if (!str) return null;

  // 1:30 → 1h 30m
  const colon = str.match(/^(\d+):(\d{1,2})$/);
  if (colon) {
    return parseInt(colon[1]) * 60 + parseInt(colon[2]);
  }

  // 1.5h or .5h → decimal hours
  const decH = str.match(/^(\d*\.\d+)h$/);
  if (decH) {
    return Math.round(parseFloat(decH[1]) * 60);
  }

  // 1h35, 1h35m, 1h 35m, 2h
  const hm = str.match(/^(\d+)h(\d*)(?:m)?$/);
  if (hm) {
    const h = parseInt(hm[1]);
    const m = hm[2] ? parseInt(hm[2]) : 0;
    return h * 60 + m;
  }

  // 45m or 45
  const justM = str.match(/^(\d+)m?$/);
  if (justM) {
    return parseInt(justM[1]);
  }

  return null;
}

function formatTime(mins) {
  mins = ((mins % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const p = h < 12 ? 'AM' : 'PM';
  return (h % 12 || 12) + ':' + String(m).padStart(2, '0') + '\u202f' + p;
}

function formatDur(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h && m) return h + 'h ' + m + 'm';
  return h ? h + 'h' : m + 'm';
}

function getStart() {
  return parseTime(document.getElementById('startInput').value);
}

let editingIndex = -1;

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const tl = document.getElementById('timeline');
  if (!steps.length) {
    tl.innerHTML = '<div class="timeline-empty">Add steps below to build your timeline.</div>';
    return;
  }
  const start = getStart();
  let cursor = start;
  let total = 0;
  let html = '';
  steps.forEach((s, i) => {
    if (cursor !== null) cursor += s.dur;
    total += s.dur;
    const t = cursor !== null ? formatTime(cursor) : '+' + formatDur(s.dur);
    const lbl = s.memo || formatDur(s.dur);
    if (i === editingIndex) {
      html += `<div class="step-row">
        <span class="step-time">${t}</span>
        <div class="step-edit-row">
          <input class="step-edit-dur" id="editDur" type="text" value="${escapeHtml(formatDur(s.dur))}" autocomplete="off" />
          <input class="step-edit-label" id="editLabel" type="text" value="${escapeHtml(s.memo)}" placeholder="label" autocomplete="off" />
        </div>
        <button class="step-delete" onclick="remove(${i})" aria-label="Remove">×</button>
      </div>`;
    } else {
      html += `<div class="step-row">
        <div class="step-content" onclick="startEdit(${i})">
          <span class="step-time">${t}</span>
          <span class="step-label">${escapeHtml(lbl)}</span>
        </div>
        <button class="step-delete" onclick="remove(${i})" aria-label="Remove">×</button>
      </div>`;
    }
  });
  html += `<div class="total-row"><span class="total-label">Total elapsed</span><span class="total-val">${formatDur(total)}</span></div>`;
  html += `<button class="clear-btn" onclick="clearAll()">Clear all</button>`;
  tl.innerHTML = html;

  if (editingIndex >= 0) {
    const dEl = document.getElementById('editDur');
    const lEl = document.getElementById('editLabel');
    dEl.focus();
    dEl.select();
    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      const newDur = parseDuration(dEl.value);
      if (newDur) steps[editingIndex].dur = newDur;
      steps[editingIndex].memo = lEl.value.trim();
      editingIndex = -1;
      render();
      save();
    };
    const maybeCommit = () => {
      // small delay so focus can settle between the two fields
      setTimeout(() => {
        if (document.activeElement !== dEl && document.activeElement !== lEl) {
          commit();
        }
      }, 100);
    };
    dEl.addEventListener('blur', maybeCommit);
    lEl.addEventListener('blur', maybeCommit);
    dEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); lEl.focus(); }
      if (e.key === 'Escape') { committed = true; editingIndex = -1; render(); }
    });
    lEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { committed = true; editingIndex = -1; render(); }
    });
  }
}

function startEdit(i) {
  editingIndex = i;
  render();
}

function remove(i) {
  if (editingIndex === i) editingIndex = -1;
  else if (editingIndex > i) editingIndex--;
  steps.splice(i, 1);
  render();
  save();
}
function clearAll() { steps.length = 0; editingIndex = -1; render(); save(); }

document.getElementById('addBtn').addEventListener('click', () => {
  const d = document.getElementById('durInput');
  const dur = parseDuration(d.value);
  if (!dur) {
    d.classList.add('error');
    setTimeout(() => d.classList.remove('error'), 1200);
    d.focus();
    return;
  }
  const memo = document.getElementById('memoInput').value.trim();
  steps.push({ dur, memo });
  d.value = '';
  document.getElementById('memoInput').value = '';
  d.focus();
  render();
  save();
});

document.getElementById('durInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('memoInput').focus();
});
document.getElementById('memoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});
document.getElementById('startInput').addEventListener('input', () => {
  render();
  save();
});

const STORAGE_KEY = 'timeCalc.v1';

function save() {
  try {
    const data = {
      startTime: document.getElementById('startInput').value,
      steps: steps,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* quota or private mode — ignore */ }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data && typeof data.startTime === 'string' && Array.isArray(data.steps)) {
      document.getElementById('startInput').value = data.startTime;
      steps.length = 0;
      data.steps.forEach(s => {
        if (typeof s.dur === 'number' && s.dur > 0) {
          steps.push({ dur: s.dur, memo: typeof s.memo === 'string' ? s.memo : '' });
        }
      });
      return true;
    }
  } catch (e) { /* corrupt data — start fresh */ }
  return false;
}

(function init() {
  const loaded = load();
  if (!loaded) {
    const n = new Date();
    let h = n.getHours(), m = n.getMinutes();
    const p = h < 12 ? 'AM' : 'PM';
    document.getElementById('startInput').value = (h % 12 || 12) + ':' + String(m).padStart(2, '0') + '\u202f' + p;
  }
  render();
})();
</script>
</body>
</html>
