<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Time Calc" />
<title>Time Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --bg2: #f2f0ec;
    --bg3: #e8e5df;
    --text: #1a1a18;
    --text2: #6b6a66;
    --text3: #a09e99;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
    --font: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2b;
      --text: #f0ede8;
      --text2: #9e9c96;
      --text3: #636159;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-text-size-adjust: 100%;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 16px) 18px env(safe-area-inset-bottom, 24px);
    padding-top: max(env(safe-area-inset-top), 20px);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  /* Start time */
  .start-block { margin-bottom: 24px; }

  .start-time-input {
    font-size: 30px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 0.5px solid var(--border2);
    width: 100%;
    padding: 4px 0 6px;
    outline: none;
    font-family: var(--font);
    -webkit-appearance: none;
  }
  .start-time-input:focus { border-bottom-color: var(--text2); }

  /* Schedule name banner */
  .schedule-name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    min-height: 16px;
  }
  .schedule-name {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .schedule-name-dot {
    color: var(--text3);
    margin: 0 6px;
  }
  .schedule-name-meta {
    color: var(--text3);
    font-weight: 400;
  }

  /* Timeline */
  .timeline { flex: 1; margin-bottom: 8px; }

  .timeline-empty {
    font-size: 14px;
    color: var(--text3);
    padding: 12px 0;
  }

  .step-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .step-row:first-child { border-top: 0.5px solid var(--border); }

  .step-time {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    min-width: 72px;
    flex-shrink: 0;
  }

  .step-dur {
    font-size: 13px;
    color: var(--text2);
    flex-shrink: 0;
  }

  .step-label {
    font-size: 15px;
    color: var(--text2);
    flex: 1;
    min-width: 0;
    margin-left: 4px;
  }

  .step-content {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: baseline;
    gap: 6px;
    cursor: pointer;
  }

  .step-edit-row {
    display: flex;
    gap: 8px;
    flex: 1;
    min-width: 0;
    align-items: center;
  }

  .step-edit-dur {
    flex: 0 0 56px;
    width: 56px;
    min-width: 0;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--text2);
    border-radius: var(--radius);
    padding: 6px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
    text-align: center;
  }

  .step-edit-label {
    flex: 1;
    min-width: 0;
    width: 100%;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--text2);
    border-radius: var(--radius);
    padding: 6px 8px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
  }

  .step-delete {
    font-size: 20px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    -webkit-appearance: none;
    flex-shrink: 0;
  }
  .step-delete:active { opacity: 0.5; }

  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 2px;
  }
  .total-label { font-size: 13px; color: var(--text3); }
  .total-val { font-size: 13px; font-weight: 500; color: var(--text2); }

  /* Action row replaces the lone Clear button */
  .action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 4px;
    margin-bottom: 16px;
    gap: 6px;
    min-height: 24px;
  }
  .action-row-left, .action-row-right {
    display: flex;
    gap: 14px;
  }
  .text-btn {
    font-size: 12px;
    color: var(--text2);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    font-family: var(--font);
    -webkit-appearance: none;
  }
  .text-btn:active { color: var(--text3); }
  .text-btn.muted { color: var(--text3); text-decoration: underline; }
  .text-btn:disabled { color: var(--text3); opacity: 0.4; cursor: default; }

  /* Entry block */
  .entry-block {
    background: var(--bg2);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 8px;
    max-width: 100%;
    box-sizing: border-box;
  }

  .entry-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    width: 100%;
  }

  .dur-input {
    flex: 0 0 56px;
    width: 56px;
    min-width: 0;
    font-size: 16px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 6px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
    text-align: center;
  }
  .dur-input:focus { border-color: var(--text2); }

  .memo-input {
    flex: 1 1 0;
    min-width: 0;
    width: 100%;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 10px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
  }
  .memo-input:focus { border-color: var(--text2); }
  .memo-input::placeholder, .dur-input::placeholder { color: var(--text3); }

  .error { border-color: #c0392b !important; }

  /* Sheet (modal) for Load / Save-as */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  .sheet-backdrop.open { display: flex; }
  @media (min-width: 520px) {
    .sheet-backdrop { align-items: center; }
  }
  .sheet {
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 18px 18px max(env(safe-area-inset-bottom), 18px);
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.18);
  }
  @media (min-width: 520px) {
    .sheet { border-radius: var(--radius-lg); }
  }

  .sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .sheet-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .sheet-close {
    font-size: 22px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .schedule-list {
    display: flex;
    flex-direction: column;
  }
  .schedule-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
  }
  .schedule-item:first-child { border-top: 0.5px solid var(--border); }
  .schedule-item:active { background: var(--bg2); }
  .schedule-item-info {
    flex: 1;
    min-width: 0;
  }
  .schedule-item-name {
    font-size: 16px;
    color: var(--text);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .schedule-item-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .schedule-item-delete {
    font-size: 20px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  .schedule-item-delete:active { opacity: 0.5; }

  .sheet-empty {
    font-size: 14px;
    color: var(--text3);
    padding: 24px 0;
    text-align: center;
  }

  /* Save-as form */
  .sheet-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sheet-input {
    font-size: 16px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    -webkit-appearance: none;
    width: 100%;
  }
  .sheet-input:focus { border-color: var(--text2); }
  .sheet-actions {
    display: flex;
    gap: 8px;
  }
  .sheet-btn {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    -webkit-appearance: none;
  }
  .sheet-btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .sheet-btn:active { opacity: 0.7; }
  .sheet-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="app">

  <div class="start-block">
    <div class="section-label">Start time</div>
    <input class="start-time-input" id="startInput" type="text" placeholder="e.g. 9:00 AM" autocomplete="off" autocorrect="off" />
  </div>

  <div class="schedule-name-row" id="scheduleNameRow"></div>

  <div class="timeline" id="timeline">
    <div class="timeline-empty">Add steps below to build your timeline.</div>
  </div>

  <div class="action-row" id="actionRow">
    <div class="action-row-left">
      <button class="text-btn" onclick="openLoadSheet()">Load</button>
      <button class="text-btn" id="saveBtn" onclick="openSaveSheet()" disabled>Save</button>
    </div>
    <div class="action-row-right">
      <button class="text-btn muted" id="clearBtn" onclick="clearAll()" style="display:none">Clear all</button>
    </div>
  </div>

  <div class="entry-block">
    <div class="section-label" style="margin-bottom:10px">Add a step</div>
    <div class="entry-row">
      <input class="dur-input" id="durInput" type="text" placeholder="45" autocomplete="off" autocorrect="off" inputmode="text" enterkeyhint="next" />
      <input class="memo-input" id="memoInput" type="text" placeholder="label (optional)" autocomplete="off" autocorrect="off" enterkeyhint="done" />
    </div>
  </div>

</div>

<!-- Load sheet -->
<div class="sheet-backdrop" id="loadSheet">
  <div class="sheet">
    <div class="sheet-header">
      <div class="sheet-title">Load schedule</div>
      <button class="sheet-close" onclick="closeSheet('loadSheet')" aria-label="Close">×</button>
    </div>
    <div id="loadSheetBody"></div>
  </div>
</div>

<!-- Save-as sheet -->
<div class="sheet-backdrop" id="saveSheet">
  <div class="sheet">
    <div class="sheet-header">
      <div class="sheet-title" id="saveSheetTitle">Save schedule</div>
      <button class="sheet-close" onclick="closeSheet('saveSheet')" aria-label="Close">×</button>
    </div>
    <div class="sheet-form">
      <input class="sheet-input" id="saveNameInput" type="text" placeholder="Schedule name" autocomplete="off" enterkeyhint="done" />
      <div class="sheet-actions">
        <button class="sheet-btn" onclick="closeSheet('saveSheet')">Cancel</button>
        <button class="sheet-btn primary" id="saveConfirmBtn" onclick="confirmSave()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const steps = [];
let currentScheduleName = '';

function parseTime(str) {
  str = str.trim();
  const ampm = str.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
  if (ampm) {
    let h = parseInt(ampm[1]);
    const m = ampm[2] ? parseInt(ampm[2]) : 0;
    const p = ampm[3].toLowerCase();
    if (p === 'pm' && h !== 12) h += 12;
    if (p === 'am' && h === 12) h = 0;
    return h * 60 + m;
  }
  const colon = str.match(/^(\d{1,2}):(\d{2})$/);
  if (colon) return parseInt(colon[1]) * 60 + parseInt(colon[2]);
  return null;
}

function parseDuration(str) {
  str = str.trim().toLowerCase().replace(/\s+/g, '');
  if (!str) return null;

  // 1:30 → 1h 30m
  const colon = str.match(/^(\d+):(\d{1,2})$/);
  if (colon) {
    return parseInt(colon[1]) * 60 + parseInt(colon[2]);
  }

  // 1.5h or .5h → decimal hours
  const decH = str.match(/^(\d*\.\d+)h$/);
  if (decH) {
    return Math.round(parseFloat(decH[1]) * 60);
  }

  // 1h35, 1h35m, 1h 35m, 2h
  const hm = str.match(/^(\d+)h(\d*)(?:m)?$/);
  if (hm) {
    const h = parseInt(hm[1]);
    const m = hm[2] ? parseInt(hm[2]) : 0;
    return h * 60 + m;
  }

  // 45m or 45
  const justM = str.match(/^(\d+)m?$/);
  if (justM) {
    return parseInt(justM[1]);
  }

  return null;
}

function formatTime(mins) {
  mins = ((mins % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const p = h < 12 ? 'AM' : 'PM';
  return (h % 12 || 12) + ':' + String(m).padStart(2, '0') + '\u202f' + p;
}

function formatDur(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h && m) return h + 'h ' + m + 'm';
  return h ? h + 'h' : m + 'm';
}

function getStart() {
  return parseTime(document.getElementById('startInput').value);
}

let editingIndex = -1;

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderScheduleName() {
  const row = document.getElementById('scheduleNameRow');
  if (currentScheduleName) {
    const stepCount = steps.length;
    const label = stepCount === 1 ? '1 step' : stepCount + ' steps';
    row.innerHTML = `<div class="schedule-name">${escapeHtml(currentScheduleName)}<span class="schedule-name-dot">·</span><span class="schedule-name-meta">${label}</span></div>`;
  } else {
    row.innerHTML = '';
  }
}

function render() {
  renderScheduleName();
  const tl = document.getElementById('timeline');
  const saveBtn = document.getElementById('saveBtn');
  const clearBtn = document.getElementById('clearBtn');
  if (!steps.length) {
    tl.innerHTML = '<div class="timeline-empty">Add steps below to build your timeline.</div>';
    saveBtn.disabled = true;
    clearBtn.style.display = 'none';
    return;
  }
  const start = getStart();
  let cursor = start;
  let total = 0;
  let html = '';
  steps.forEach((s, i) => {
    if (cursor !== null) cursor += s.dur;
    total += s.dur;
    const t = cursor !== null ? formatTime(cursor) : '+' + formatDur(s.dur);
    const durStr = formatDur(s.dur);
    const hasMemo = !!s.memo;
    if (i === editingIndex) {
      html += `<div class="step-row">
        <span class="step-time">${t}</span>
        <div class="step-edit-row">
          <input class="step-edit-dur" id="editDur" type="text" value="${escapeHtml(durStr)}" autocomplete="off" />
          <input class="step-edit-label" id="editLabel" type="text" value="${escapeHtml(s.memo)}" placeholder="label" autocomplete="off" />
        </div>
        <button class="step-delete" onclick="remove(${i})" aria-label="Remove">×</button>
      </div>`;
    } else if (hasMemo) {
      html += `<div class="step-row">
        <div class="step-content" onclick="startEdit(${i})">
          <span class="step-time">${t}</span>
          <span class="step-dur">${escapeHtml(durStr)}</span>
          <span class="step-label">${escapeHtml(s.memo)}</span>
        </div>
        <button class="step-delete" onclick="remove(${i})" aria-label="Remove">×</button>
      </div>`;
    } else {
      // No label — show duration once in the label slot (existing fallback behavior)
      html += `<div class="step-row">
        <div class="step-content" onclick="startEdit(${i})">
          <span class="step-time">${t}</span>
          <span class="step-label">${escapeHtml(durStr)}</span>
        </div>
        <button class="step-delete" onclick="remove(${i})" aria-label="Remove">×</button>
      </div>`;
    }
  });
  html += `<div class="total-row"><span class="total-label">Total elapsed</span><span class="total-val">${formatDur(total)}</span></div>`;
  tl.innerHTML = html;

  // Steps exist at this point
  saveBtn.disabled = false;
  clearBtn.style.display = '';

  if (editingIndex >= 0) {
    const dEl = document.getElementById('editDur');
    const lEl = document.getElementById('editLabel');
    dEl.focus();
    dEl.select();
    let committed = false;

    const applyDur = () => {
      const newDur = parseDuration(dEl.value);
      if (newDur) steps[editingIndex].dur = newDur;
    };
    const applyLabel = () => {
      steps[editingIndex].memo = lEl.value.trim();
    };
    const commit = () => {
      if (committed) return;
      committed = true;
      applyDur();
      applyLabel();
      editingIndex = -1;
      render();
      save();
    };
    const maybeCommit = () => {
      setTimeout(() => {
        if (document.activeElement !== dEl && document.activeElement !== lEl) {
          commit();
        }
      }, 100);
    };

    dEl.addEventListener('input', applyDur);
    lEl.addEventListener('input', applyLabel);

    dEl.addEventListener('blur', maybeCommit);
    lEl.addEventListener('blur', maybeCommit);

    const isEnter = e => e.key === 'Enter' || e.keyCode === 13 || e.which === 13;
    const handleEditKey = (e) => {
      if (isEnter(e)) { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { committed = true; editingIndex = -1; render(); }
    };
    dEl.addEventListener('keydown', handleEditKey);
    lEl.addEventListener('keydown', handleEditKey);
    dEl.addEventListener('keypress', e => { if (isEnter(e)) { e.preventDefault(); commit(); } });
    lEl.addEventListener('keypress', e => { if (isEnter(e)) { e.preventDefault(); commit(); } });
  }
}

function startEdit(i) {
  editingIndex = i;
  render();
}

function remove(i) {
  if (editingIndex === i) editingIndex = -1;
  else if (editingIndex > i) editingIndex--;
  steps.splice(i, 1);
  render();
  save();
}
function clearAll() {
  steps.length = 0;
  editingIndex = -1;
  currentScheduleName = '';
  const n = new Date();
  let h = n.getHours(), m = n.getMinutes();
  document.getElementById('startInput').value = (h % 12 || 12) + ':' + String(m).padStart(2, '0') + '\u202f' + (h < 12 ? 'AM' : 'PM');
  render();
  save();
}

function addStep() {
  const d = document.getElementById('durInput');
  const dur = parseDuration(d.value);
  if (!dur) {
    d.classList.add('error');
    setTimeout(() => d.classList.remove('error'), 1200);
    d.focus();
    return;
  }
  const memo = document.getElementById('memoInput').value.trim();
  steps.push({ dur, memo });
  d.value = '';
  document.getElementById('memoInput').value = '';
  d.focus();
  render();
  save();
}

const isEnterKey = e => e.key === 'Enter' || e.keyCode === 13 || e.which === 13;

document.getElementById('durInput').addEventListener('keydown', e => {
  if (isEnterKey(e)) { e.preventDefault(); document.getElementById('memoInput').focus(); }
});
document.getElementById('memoInput').addEventListener('keydown', e => {
  if (isEnterKey(e)) { e.preventDefault(); addStep(); }
});
document.getElementById('startInput').addEventListener('input', () => {
  render();
  save();
});

/* ---------- Storage ---------- */

const STORAGE_KEY = 'timeCalc.v1';
const SCHEDULES_KEY = 'timeCalc.schedules.v1';

function save() {
  try {
    const data = {
      startTime: document.getElementById('startInput').value,
      steps: steps,
      currentScheduleName: currentScheduleName,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* quota or private mode — ignore */ }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data && typeof data.startTime === 'string' && Array.isArray(data.steps)) {
      document.getElementById('startInput').value = data.startTime;
      steps.length = 0;
      data.steps.forEach(s => {
        if (typeof s.dur === 'number' && s.dur > 0) {
          steps.push({ dur: s.dur, memo: typeof s.memo === 'string' ? s.memo : '' });
        }
      });
      currentScheduleName = typeof data.currentScheduleName === 'string' ? data.currentScheduleName : '';
      return true;
    }
  } catch (e) { /* corrupt data — start fresh */ }
  return false;
}

function loadSchedules() {
  try {
    const raw = localStorage.getItem(SCHEDULES_KEY);
    if (!raw) return {};
    const data = JSON.parse(raw);
    return (data && typeof data === 'object') ? data : {};
  } catch (e) { return {}; }
}

function saveSchedules(obj) {
  try {
    localStorage.setItem(SCHEDULES_KEY, JSON.stringify(obj));
  } catch (e) { /* ignore */ }
}

/* ---------- Sheets ---------- */

function openSheet(id) {
  document.getElementById(id).classList.add('open');
}
function closeSheet(id) {
  document.getElementById(id).classList.remove('open');
}

// Close sheet when tapping backdrop
['loadSheet', 'saveSheet'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) closeSheet(id);
  });
});

/* ---------- Load flow ---------- */

function openLoadSheet() {
  renderLoadSheet();
  openSheet('loadSheet');
}

function renderLoadSheet() {
  const body = document.getElementById('loadSheetBody');
  const schedules = loadSchedules();
  const names = Object.keys(schedules).sort((a, b) => a.localeCompare(b));
  if (!names.length) {
    body.innerHTML = '<div class="sheet-empty">No saved schedules yet.<br>Build a timeline and tap Save to create one.</div>';
    return;
  }
  let html = '<div class="schedule-list">';
  names.forEach(name => {
    const sched = schedules[name];
    const stepCount = Array.isArray(sched.steps) ? sched.steps.length : 0;
    const totalMins = Array.isArray(sched.steps) ? sched.steps.reduce((sum, s) => sum + (s.dur || 0), 0) : 0;
    const meta = (stepCount === 1 ? '1 step' : stepCount + ' steps') + ' · ' + formatDur(totalMins);
    html += `<div class="schedule-item" onclick="loadSchedule('${escapeHtml(name).replace(/'/g, "\\'")}')">
      <div class="schedule-item-info">
        <div class="schedule-item-name">${escapeHtml(name)}</div>
        <div class="schedule-item-meta">${meta}</div>
      </div>
      <button class="schedule-item-delete" onclick="event.stopPropagation();deleteSchedule('${escapeHtml(name).replace(/'/g, "\\'")}')" aria-label="Delete">×</button>
    </div>`;
  });
  html += '</div>';
  body.innerHTML = html;
}

function loadSchedule(name) {
  const schedules = loadSchedules();
  const sched = schedules[name];
  if (!sched || !Array.isArray(sched.steps)) return;

  if (steps.length && !confirm('Replace the current timeline with "' + name + '"?')) {
    return;
  }

  steps.length = 0;
  sched.steps.forEach(s => {
    if (typeof s.dur === 'number' && s.dur > 0) {
      steps.push({ dur: s.dur, memo: typeof s.memo === 'string' ? s.memo : '' });
    }
  });
  currentScheduleName = name;
  editingIndex = -1;
  closeSheet('loadSheet');
  render();
  save();
}

function deleteSchedule(name) {
  if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
  const schedules = loadSchedules();
  delete schedules[name];
  saveSchedules(schedules);
  // If the currently loaded schedule was deleted, clear its name (but keep the timeline)
  if (currentScheduleName === name) {
    currentScheduleName = '';
    render();
    save();
  }
  renderLoadSheet();
}

/* ---------- Save flow ---------- */

let saveMode = 'new'; // 'new' | 'update'

function openSaveSheet() {
  if (!steps.length) return;
  const input = document.getElementById('saveNameInput');
  const title = document.getElementById('saveSheetTitle');
  const btn = document.getElementById('saveConfirmBtn');

  if (currentScheduleName) {
    // Offer both: update current, or save as new
    saveMode = 'update';
    title.textContent = 'Save schedule';
    input.value = currentScheduleName;
    btn.textContent = 'Save';
  } else {
    saveMode = 'new';
    title.textContent = 'Save schedule';
    input.value = '';
    btn.textContent = 'Save';
  }
  openSheet('saveSheet');
  setTimeout(() => { input.focus(); input.select(); }, 50);
}

document.getElementById('saveNameInput').addEventListener('keydown', e => {
  if (isEnterKey(e)) { e.preventDefault(); confirmSave(); }
});

function confirmSave() {
  const input = document.getElementById('saveNameInput');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  if (!steps.length) return;

  const schedules = loadSchedules();
  const existed = Object.prototype.hasOwnProperty.call(schedules, name);

  // If overwriting a different existing schedule, confirm
  if (existed && name !== currentScheduleName) {
    if (!confirm('Overwrite existing schedule "' + name + '"?')) return;
  }

  // If renaming (current schedule has a different name, and we're saving to a new name),
  // ask whether to delete the old one
  if (currentScheduleName && name !== currentScheduleName) {
    if (confirm('Also delete the old schedule "' + currentScheduleName + '"?')) {
      delete schedules[currentScheduleName];
    }
  }

  schedules[name] = {
    steps: steps.map(s => ({ dur: s.dur, memo: s.memo || '' })),
    savedAt: Date.now(),
  };
  saveSchedules(schedules);
  currentScheduleName = name;
  closeSheet('saveSheet');
  render();
  save();
}

/* ---------- Init ---------- */

(function init() {
  const loaded = load();
  if (!loaded) {
    const n = new Date();
    let h = n.getHours(), m = n.getMinutes();
    document.getElementById('startInput').value = (h % 12 || 12) + ':' + String(m).padStart(2, '0') + '\u202f' + (h < 12 ? 'AM' : 'PM');
  }
  render();
})();
</script>
</body>
</html>
